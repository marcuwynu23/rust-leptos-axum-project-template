# Leptos + Axum monorepo: build, test, and optional deploy.
# Customize: add deploy job, matrix strategy, or cache keys.

name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
        continue-on-error: true

      - name: Build (no leptos)
        run: cargo build --workspace --exclude server --exclude frontend

  build:
    name: Build Leptos (release)
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-leptos-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-leptos-

      - name: Install cargo-leptos
        run: cargo install cargo-leptos --locked

      - name: Install dart-sass (for SCSS)
        run: |
          curl -L https://github.com/sass/dart-sass/releases/download/1.69.5/dart-sass-1.69.5-linux-x64.tar.gz | tar xz -C /tmp
          sudo mv /tmp/dart-sass /usr/local
          echo "/usr/local/dart-sass" >> $GITHUB_PATH
          echo "PATH=/usr/local/dart-sass:$PATH" >> $GITHUB_ENV

      - name: Build release (default features)
        run: cargo leptos build --release

      - name: Upload server binary (optional)
        uses: actions/upload-artifact@v4
        with:
          name: server-linux
          path: target/server/release/server

      - name: Upload site (optional)
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: target/site
